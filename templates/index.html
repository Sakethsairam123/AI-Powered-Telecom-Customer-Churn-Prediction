<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telecom Customer Churn Prediction</title>
<link rel="icon"
      type="image/png"
      href="{{ url_for('static', filename='images/favicon.png') }}">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<section class="hero text-center py-5">
    <div class="container">
        <h1><i class="fa-solid fa-tower-cell"></i> Telecom Customer Churn Prediction</h1>
        <p class="lead">AI Powered Customer Retention System</p>
    </div>
</section>

<div class="container mb-5">
<div class="main-card">

<form action="/predict" method="POST">

<h3 class="mb-4">Customer Information</h3>

<div class="row g-3">

<div class="col-md-6">
<label class="form-label"><i class="fa-solid fa-user"></i> Gender</label>
<select class="form-select" name="gender">
<option>Male</option>
<option>Female</option>
</select>
</div>

<div class="col-md-6">
<label class="form-label">Senior Citizen</label>
<select class="form-select" name="SeniorCitizen">
<option value="0">No</option>
<option value="1">Yes</option>
</select>
</div>

<div class="col-md-6">
<label class="form-label">Partner</label>
<select class="form-select" name="Partner">
<option>Yes</option><option>No</option>
</select>
</div>

<div class="col-md-6">
<label class="form-label">Dependents</label>
<select class="form-select" name="Dependents">
<option>Yes</option><option>No</option>
</select>
</div>

<div class="col-md-6">
<label class="form-label">Tenure</label>
<input class="form-control" type="number" name="tenure" min="0" max="72" required>
</div>

<div class="col-md-6">
<label class="form-label">Phone Service</label>
<select class="form-select" name="PhoneService">
<option>Yes</option><option>No</option>
</select>
</div>

<div class="col-md-6">
<label class="form-label">Multiple Lines</label>
<select class="form-select" name="MultipleLines">
<option>Yes</option><option>No</option><option>No phone service</option>
</select>
</div>

<div class="col-md-6">
<label class="form-label">Internet Service</label>
<select class="form-select" name="InternetService">
<option>DSL</option><option>Fiber optic</option><option>No</option>
</select>
</div>

<div class="col-md-6">
<label class="form-label">Online Security</label>
<select class="form-select" name="OnlineSecurity">
<option>Yes</option><option>No</option><option>No internet service</option>
</select>
</div>

<div class="col-md-6">
<label class="form-label">Online Backup</label>
<select class="form-select" name="OnlineBackup">
<option>Yes</option><option>No</option><option>No internet service</option>
</select>
</div>

<div class="col-md-6">
<label class="form-label">Device Protection</label>
<select class="form-select" name="DeviceProtection">
<option>Yes</option><option>No</option><option>No internet service</option>
</select>
</div>

<div class="col-md-6">
<label class="form-label">Tech Support</label>
<select class="form-select" name="TechSupport">
<option>Yes</option><option>No</option><option>No internet service</option>
</select>
</div>

<div class="col-md-6">
<label class="form-label">Streaming TV</label>
<select class="form-select" name="StreamingTV">
<option>Yes</option><option>No</option><option>No internet service</option>
</select>
</div>

<div class="col-md-6">
<label class="form-label">Streaming Movies</label>
<select class="form-select" name="StreamingMovies">
<option>Yes</option><option>No</option><option>No internet service</option>
</select>
</div>

<div class="col-md-6">
<label class="form-label">Contract</label>
<select class="form-select" name="Contract">
<option>Month-to-month</option><option>One year</option><option>Two year</option>
</select>
</div>

<div class="col-md-6">
<label class="form-label">Paperless Billing</label>
<select class="form-select" name="PaperlessBilling">
<option>Yes</option><option>No</option>
</select>
</div>

<div class="col-md-6">
<label class="form-label">Payment Method</label>
<select class="form-select" name="PaymentMethod">
<option>Electronic check</option>
<option>Mailed check</option>
<option>Bank transfer (automatic)</option>
<option>Credit card (automatic)</option>
</select>
</div>

<div class="col-md-6">
<label class="form-label">Monthly Charges</label>
<input class="form-control" type="number" step="0.01" name="MonthlyCharges" required>
</div>

<div class="col-md-6">
<label class="form-label">Total Charges</label>
<input class="form-control" type="number" step="0.01" name="TotalCharges" required>
</div>

</div>

<div class="text-center mt-4">
<button class="btn btn-primary btn-lg px-5" type="submit">
<i class="fa-solid fa-magnifying-glass-chart"></i> Predict Churn
</button>
</div>

</form>

{% if prediction %}
<div class="prediction-card mt-5">

<h2>{{ prediction }}</h2>
<h4>{{ risk }}</h4>

<div class="progress my-4" style="height:30px;">
<div class="progress-bar {% if color=='danger' %}bg-danger{% else %}bg-success{% endif %}"
style="width: {{ probability_value }}%;">
{{ probability }}
</div>
</div>

<h5>AI Recommendations</h5>

<div class="row g-3 mt-2">

<div class="col-md-6"><div class="recommend-card">💰 Offer Annual Contract Discount</div></div>
<div class="col-md-6"><div class="recommend-card">🛠 Free Tech Support</div></div>
<div class="col-md-6"><div class="recommend-card">🔒 Bundle Online Security</div></div>
<div class="col-md-6"><div class="recommend-card">🎁 Loyalty Rewards</div></div>

</div>

</div>
{% endif %}

</div>
</div>

</body>
</html>
